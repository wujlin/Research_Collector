# ── 主题分类法 ──
# 结构不是几个并列孤岛，而是一条可递归展开的研究链。

stochastic_analysis:
  display_name: "随机分析"
  description: "数学骨架层：从随机路径、Ito calculus 到连续随机动力学。"
  subtopics:
    path_foundations:
      display_name: "路径基础"
      description: "Brownian motion、Wiener 过程与随机积分的起点。"
      keywords:
        - "stochastic process"
        - "random path"
        - "wiener process"
        - "ito calculus"
      subtopics:
        brownian_motion:
          display_name: "布朗运动与Wiener过程"
          keywords:
            - "brownian motion"
            - "wiener process"
            - "random walk"
            - "diffusion process"
        ito_calculus:
          display_name: "Ito积分与随机积分"
          keywords:
            - "ito calculus"
            - "ito integral"
            - "stochastic integral"
            - "ito formula"
            - "stochastic calculus"
            - "semimartingale"
    stochastic_dynamics:
      display_name: "随机动力学"
      description: "SDE 建模、数值离散化与路径模拟。"
      keywords:
        - "stochastic differential equation"
        - "langevin equation"
        - "path simulation"
        - "stochastic numerics"
      subtopics:
        sde_theory:
          display_name: "SDE理论与解"
          keywords:
            - "stochastic differential equation"
            - "langevin equation"
            - "ornstein-uhlenbeck"
            - "geometric brownian"
            - "existence and uniqueness"
            - "strong solution"
            - "weak solution"
            - "mckean-vlasov"
            - "mean field dynamics"
            - "mean-field limit"
        sde_numerics:
          display_name: "SDE数值方法"
          keywords:
            - "euler-maruyama"
            - "milstein"
            - "stochastic numerics"
            - "numerical sde"
            - "monte carlo simulation"
            - "path simulation"
    asymptotics_and_variation:
      display_name: "渐近与变分工具"
      description: "大偏差、稀有事件与 Malliavin 工具。"
      keywords:
        - "large deviation"
        - "rare event"
        - "malliavin"
        - "importance sampling"
      subtopics:
        large_deviations:
          display_name: "大偏差与稀有事件"
          keywords:
            - "large deviation"
            - "rare event"
            - "cramer"
            - "sanov"
            - "varadhan"
            - "importance sampling"
        malliavin_calculus:
          display_name: "Malliavin微积分"
          keywords:
            - "malliavin"
            - "stochastic calculus of variations"
            - "clark-ocone"

