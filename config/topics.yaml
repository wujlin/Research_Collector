            - "canonical ensemble"
            - "microcanonical"
            - "grand canonical"
            - "boltzmann distribution"
            - "maximum entropy"
            - "free energy"
            - "equipartition"
    non_equilibrium_dynamics:
      display_name: "非平衡动力学"
      description: "熵产生、稳态、耗散与涨落定理。"
      keywords:
        - "nonequilibrium"
        - "non-equilibrium"
        - "entropy production"
        - "irreversibility"
        - "stochastic thermodynamics"
      subtopics:
        nonequilibrium:
          display_name: "非平衡统计力学"
