  display_name: "统计物理"
  description: "物理语义层：熵、自由能、涨落定理、稳态与不可逆性。"
  subtopics:
    equilibrium_structures:
      display_name: "平衡结构"
      description: "配分函数、系综与热力学势。"
      keywords:
        - "equilibrium statistical mechanics"
        - "partition function"
        - "ensemble"
        - "free energy"
