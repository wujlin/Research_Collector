# ── Research Collector 全局配置 ──

collection:
  # 每日 arXiv 扫描时间 (24h format)
  daily_arxiv_hour: 8
  daily_arxiv_minute: 0

  # 每周全面更新 (0=Monday, 6=Sunday)
  weekly_full_day: 0
  weekly_full_hour: 9

  # 每月 YouTube + 摘要 (day of month)
  monthly_youtube_day: 1
  monthly_youtube_hour: 10

  source_policies:
    arxiv:
      enabled: true
      # arXiv API 对连发请求较敏感；默认按礼貌间隔访问，并在 429 时退避重试
      min_interval_seconds: 3.5
      max_retries_on_429: 2
      base_backoff_seconds: 8
    semantic_scholar:
      enabled: false
      # API 申请暂未通过，当前先整体封存该源；恢复前不要纳入默认采集工作流
      # 默认全源采集时，没有 API key 就跳过，避免撞共享限流池
      use_in_all_runs_without_api_key: false
      # 显式触发该源时，429 后的最大重试次数
      max_retries_on_429: 2
      # 429 后的基础退避秒数，会按 2^attempt 递增
      base_backoff_seconds: 4
      # 没有 API key 时，将单次请求结果数压低
      limit_without_api_key: 10

  per_query_limits:
    arxiv: 10
    semantic_scholar: 8
    openalex: 10
    youtube: 4

filtering:
  # 相关性评分阈值 (0-100)，低于此值的论文不入库
  relevance_threshold: 30

  # 最大采集论文数 / 每次
  max_papers_per_run: 320

  # 引用数下限 (对于非预印本)
  min_citations: 0

  # 发表年份下限
  min_year: 2015

  # 明显偏离当前研究方向的噪音主题词
  negative_keywords:
    - "mutagenesis"
    - "molecular recognition"
    - "syntaxin"
    - "protein-ligand"
    - "aqueous solution"
    - "enzyme kinetics"

  youtube:
    min_query_token_hits: 2
    min_positive_keyword_hits: 1
    positive_keywords:
      - "stochastic thermodynamics"
      - "non equilibrium"
      - "nonequilibrium"
      - "statistical physics"
      - "thermodynamics"
      - "fokker-planck"
      - "master equation"
      - "stochastic differential equation"
      - "sde"
      - "brownian motion"
      - "langevin"
      - "markov chain"
      - "random walk"
      - "ergodicity"
      - "diffusion model"
      - "score-based"
      - "score matching"
      - "flow matching"
      - "generative model"
      - "variational inference"
      - "free energy"
      - "bayesian inverse"
      - "inverse problem"
      - "physics-informed"
      - "scientific machine learning"
      - "dynamical systems"
      - "urban scaling"
      - "complexity and cities"
    negative_keywords:
      - "biomedical portfolios"
      - "rare diseases"
      - "fusion energy development"
      - "protein-ligand"
      - "drug discovery"
      - "molecular recognition"
      - "mutagenesis"
      - "clinical"
      - "glioma"
      - "orthopedic"
      - "dental implants"
      - "portfolio"

storage:
  database_path: "data/papers.db"
  cache_dir: "data/cache"
  library_dir: "library"
  youtube_dir: "youtube"
  digest_dir: "digests"

export:
  # 阅读列表最大论文数
  reading_list_size: 20

  # 摘要中包含的论文数
  digest_paper_count: 30

git:
  auto_commit: true
  commit_message_prefix: "[auto-collect]"

