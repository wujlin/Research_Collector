# ── Research Collector 全局配置 ──

collection:
  # 每日 arXiv 扫描时间 (24h format)
  daily_arxiv_hour: 8
  daily_arxiv_minute: 0

  # 每周全面更新 (0=Monday, 6=Sunday)
  weekly_full_day: 0
  weekly_full_hour: 9

  # 每月 YouTube + 摘要 (day of month)
  monthly_youtube_day: 1
  monthly_youtube_hour: 10

  source_policies:
    arxiv:
      enabled: true
      # arXiv API 对连发请求较敏感；默认按礼貌间隔访问，并在 429 时退避重试
      min_interval_seconds: 3.5
      max_retries_on_429: 2
      base_backoff_seconds: 8
    openalex:
      enabled: true
      # OpenAlex 查询在复杂关键词组合下响应较慢；提高默认超时，并在读超时后重试
      timeout_seconds: 120
      max_retries_on_timeout: 2
      base_backoff_seconds: 6
    semantic_scholar:
      enabled: true
      # 单 key 配额为 1 RPS；主动留一点余量，避免多 query 连发撞限流
      min_interval_seconds: 1.1
      # 默认全源采集时，没有 API key 就跳过，避免撞共享限流池
      use_in_all_runs_without_api_key: false
      # 显式触发该源时，429 后的最大重试次数
      max_retries_on_429: 2
      # 429 后的基础退避秒数，会按 2^attempt 递增
      base_backoff_seconds: 4
      # 没有 API key 时，将单次请求结果数压低
      limit_without_api_key: 10

  per_query_limits:
    arxiv: 30
    semantic_scholar: 8
    openalex: 25
    youtube: 4

filtering:
  # 相关性评分阈值 (0-100)，低于此值的论文不入库
  relevance_threshold: 30
  source_relevance_thresholds:
    openalex: 35

  # 对高噪声来源只保留主线 topic 前缀，避免泛关键词把工程应用和边缘 ML 带进来
  source_allowed_topic_prefixes:
    openalex:
      - "stochastic_analysis/"
      - "statistical_physics/"
      - "ai_for_physics/"
      - "bridges/"
      - "urban_complex_systems/"

  # 最大采集论文数 / 每次
  max_papers_per_run: 320

  # 引用数下限 (对于非预印本)
  min_citations: 0
  source_min_citations:
    openalex: 0

  # 对高噪声来源要求至少命中一个 leaf topic，避免泛关键词把边缘应用带进来
  require_leaf_topics_for_sources:
    - "openalex"

  # 发表年份下限
  min_year: 2015

  # 明显偏离当前研究方向的噪音主题词
  negative_keywords:
